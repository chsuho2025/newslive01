<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>실시간 뉴스 TOP 5</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: #F2F4F6;
    font-family: 'Noto Sans KR', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .screen {
    width: 100vw; height: 56.25vw;
    max-height: 100vh; max-width: 177.78vh;
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: #F2F4F6;
    display: flex; flex-direction: column;
    padding: 3.5% 5%; gap: 2%;
  }
  .header {
    display: flex; align-items: center;
    justify-content: space-between; flex-shrink: 0;
  }
  .live-badge {
    display: flex; align-items: center; gap: 0.55em;
    background: #F04452; color: #fff;
    font-size: 1.1vw; font-weight: 700;
    padding: 0.5em 1.2em; border-radius: 100px;
    box-shadow: 0 2px 14px rgba(240,68,82,0.35);
  }
  .live-dot {
    width: 0.6em; height: 0.6em;
    background: #fff; border-radius: 50%;
    animation: blink 1.4s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
  .title-text {
    font-size: 2.8vw; font-weight: 900;
    color: #191F28; letter-spacing: -0.03em; white-space: nowrap;
  }
  .title-text span { color: #3182F6; }
  .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 0.2em; }
  .dt-time { font-size: 1.6vw; font-weight: 800; color: #191F28; letter-spacing: -0.02em; line-height: 1; }
  .dt-date { font-size: 0.9vw; font-weight: 500; color: #8B95A1; }

.loading-overlay {
position: absolute; inset: 0;
background: rgba(242,244,246,0.93);
display: flex; flex-direction: column;
align-items: center; justify-content: center;
gap: 1.2vw; z-index: 100;
border-radius: 1.2vw; backdrop-filter: blur(4px);
transition: opacity 0.3s;
}
.loading-overlay.hidden { opacity: 0; pointer-events: none; }
.spinner {
width: 2.8vw; height: 2.8vw;
border: 0.28vw solid #E5E8EB;
border-top-color: #3182F6; border-radius: 50%;
animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 1.3vw; font-weight: 700; color: #3182F6; }
.loading-sub { font-size: 1vw; font-weight: 500; color: #8B95A1; margin-top: -0.6vw; }

.news-list {
display: flex; flex-direction: column;
gap: 1.2%; flex: 1; min-height: 0; position: relative;
}
.news-card {
background: #fff; border-radius: 1.2vw;
border: 1.5px solid #E5E8EB;
box-shadow: 0 1px 8px rgba(0,0,0,0.04);
overflow: hidden; flex: 1;
display: flex; flex-direction: column;
transition: flex 0.5s cubic-bezier(0.23,1,0.32,1), border-color 0.3s, box-shadow 0.3s;
}
.news-card.active {
flex: 3.5; border-color: #3182F6;
box-shadow: 0 6px 28px rgba(49,130,246,0.15);
}
.news-card.rank1 {
background: #3182F6; border-color: #3182F6;
box-shadow: 0 4px 20px rgba(49,130,246,0.28);
}
.news-card.rank1.active { flex: 3.5; box-shadow: 0 8px 36px rgba(49,130,246,0.38); }
.news-card.rolling { animation: cardRoll 0.6s cubic-bezier(0.23,1,0.32,1) both; }
@keyframes cardRoll { 0%{opacity:0.3;transform:translateY(-8px)} 100%{opacity:1;transform:translateY(0)} }

.card-row {
display: flex; align-items: center;
padding: 0 2.4%; gap: 1.8%; flex: 1; min-height: 0;
}
.rank-num {
font-size: 2.4vw; font-weight: 900;
letter-spacing: -0.04em; min-width: 3.3vw;
text-align: center; line-height: 1;
color: #191F28; flex-shrink: 0;
}
.news-card.rank1 .rank-num { color: #fff; }
.vline { width: 1.5px; height: 36%; background: #E5E8EB; flex-shrink: 0; }
.news-card.rank1 .vline { background: rgba(255,255,255,0.3); }

/* 타이틀: 줄바꿈 허용, 말줄임 없음 */
.headline {
flex: 1;
font-weight: 700;
color: #191F28;
letter-spacing: -0.02em;
line-height: 1.35;
word-break: keep-all;
overflow: hidden;
/* 말줄임 제거 */
display: block;
white-space: normal;
}
.news-card.rank1 .headline { color: #fff; }

/* 확장 영역 */
.card-extra {
max-height: 0; overflow: hidden; opacity: 0;
transition: max-height 0.5s cubic-bezier(0.23,1,0.32,1), opacity 0.35s ease 0.1s, padding 0.4s;
padding: 0 2.4% 0 calc(2.4% + 3.3vw + 1.8% + 1.5px + 1.8%);
}
.news-card.active .card-extra {
/* 충분히 크게 설정 */
max-height: 20vw;
opacity: 1;
padding-bottom: 1.2vw;
}

/* 설명: 말줄임 없음, 줄바꿈 자연스럽게 */
.extra-text {
font-size: 1.1vw;
font-weight: 500;
color: #4E5968;
line-height: 1.8;
word-break: keep-all;
white-space: normal;
overflow: visible;
/* 말줄임 클램프 제거 */
}
.news-card.rank1 .extra-text { color: rgba(255,255,255,0.88); }

.footer { display: flex; align-items: center; gap: 1.5%; flex-shrink: 0; }
.ai-badge {
display: flex; align-items: center; gap: 0.4em;
font-size: 0.9vw; font-weight: 600; color: #8B95A1; white-space: nowrap;
}
.ai-dot {
width: 0.5em; height: 0.5em; background: #00B493;
border-radius: 50%; animation: blink 2s ease-in-out infinite;
}
.prog-track { flex: 1; height: 0.28vw; background: #E5E8EB; border-radius: 100px; overflow: hidden; }
.prog-fill { height: 100%; background: #3182F6; border-radius: 100px; width: 0%; transition: width 1s linear; }
.footer-count { font-size: 1vw; font-weight: 700; color: #3182F6; white-space: nowrap; min-width: 4vw; text-align: right; }
</style>

</head>
<body>
<div class="screen">
  <div class="header">
    <div class="live-badge"><div class="live-dot"></div>LIVE</div>
    <div class="title-text">실시간 뉴스 <span>TOP 5</span></div>
    <div class="header-right">
      <div class="dt-time" id="dtTime">00시 00분</div>
      <div class="dt-date" id="dtDate">2026년 3월 6일 금요일</div>
    </div>
  </div>

  <div class="news-list" id="newsList">
    <div class="loading-overlay" id="loader">
      <div class="spinner"></div>
      <div class="loading-text">뉴스를 불러오는 중입니다</div>
      <div class="loading-sub">잠시만 기다려주세요...</div>
    </div>
  </div>

  <div class="footer">
    <div class="ai-badge"><div class="ai-dot"></div>실시간 자동 업데이트</div>
    <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
    <div class="footer-count" id="countdown">60초 후</div>
  </div>
</div>

<script>
  var newsData = [];
  var seqTimer = null;
  var seqStep = 0;
  var timeLeft = 60;

  function updateClock() {
    var now = new Date();
    var h = String(now.getHours()).padStart(2,'0');
    var m = String(now.getMinutes()).padStart(2,'0');
    document.getElementById('dtTime').textContent = h + '시 ' + m + '분';
    var days = ['일','월','화','수','목','금','토'];
    document.getElementById('dtDate').textContent =
      now.getFullYear() + '년 ' + (now.getMonth()+1) + '월 ' + now.getDate() + '일 ' + days[now.getDay()] + '요일';
  }
  updateClock();
  setInterval(updateClock, 1000);

  // 타이틀 길이에 따라 폰트 자동 조절
  function getFontSize(len) {
    if (len <= 18) return '1.9vw';
    if (len <= 28) return '1.75vw';
    if (len <= 38) return '1.6vw';
    if (len <= 50) return '1.45vw';
    return '1.3vw';
  }

  // 텍스트 자르기 (말줄임 없이 문장 단위로)
  function trimText(text, maxLen) {
    if (!text) return '';
    if (text.length <= maxLen) return text;
    // maxLen 이내에서 마지막 온점/공백 기준으로 자르기
    var cut = text.substring(0, maxLen);
    var lastPeriod = Math.max(cut.lastIndexOf('.'), cut.lastIndexOf(' '));
    if (lastPeriod > maxLen * 0.7) return cut.substring(0, lastPeriod + 1);
    return cut;
  }

  function renderCards(data, animate) {
    var list = document.getElementById('newsList');
    var loader = document.getElementById('loader');
    list.querySelectorAll('.news-card').forEach(function(c){ c.remove(); });

    data.forEach(function(item, i) {
      var card = document.createElement('div');
      card.className = 'news-card' + (i === 0 ? ' rank1' : '') + (animate ? ' rolling' : '');
      card.id = 'card-' + i;
      if (animate) card.style.animationDelay = (i * 0.12) + 's';

      var headline = trimText(item.headline, 40);
      var detail = trimText(item.detail, 120);

      card.innerHTML =
        '<div class="card-row">' +
          '<div class="rank-num">0' + (i+1) + '</div>' +
          '<div class="vline"></div>' +
          '<div class="headline" style="font-size:' + getFontSize(headline.length) + '">' + headline + '</div>' +
        '</div>' +
        '<div class="card-extra"><div class="extra-text">' + detail + '</div></div>';
      list.insertBefore(card, loader);
    });
  }

  function activateCard(idx) {
    for (var i = 0; i < 5; i++) {
      var c = document.getElementById('card-' + i);
      if (c) c.classList.remove('active');
    }
    if (idx >= 0) {
      var c = document.getElementById('card-' + idx);
      if (c) c.classList.add('active');
    }
  }

  function runSeq() {
    clearTimeout(seqTimer);
    if (seqStep === 0) {
      activateCard(-1);
      seqTimer = setTimeout(function(){ seqStep = 1; runSeq(); }, 5000);
    } else if (seqStep >= 1 && seqStep <= 5) {
      activateCard(seqStep - 1);
      seqTimer = setTimeout(function(){ seqStep++; runSeq(); }, 10000);
    } else {
      activateCard(-1);
      seqTimer = setTimeout(function(){ seqStep = 0; runSeq(); }, 5000);
    }
  }

  async function fetchNews() {
    var loader = document.getElementById('loader');
    loader.classList.remove('hidden');
    clearTimeout(seqTimer);
    activateCard(-1);

    try {
      var res = await fetch('/api/news');
      var data = await res.json();
      if (!data.items || data.items.length === 0) throw new Error('데이터 없음');

      newsData = data.items.slice(0, 5).map(function(item) {
        return {
          headline: item.title,
          detail: item.description || '자세한 내용은 원문을 확인해주세요.'
        };
      });
      renderCards(newsData, true);

    } catch(e) {
      console.error(e);
      if (newsData.length === 0) {
        newsData = [
          { headline: '뉴스를 불러오는 중 오류가 발생했습니다', detail: '네트워크 연결을 확인해주세요.' },
          { headline: '잠시 후 자동으로 재시도합니다', detail: '60초 후 자동으로 다시 뉴스를 불러옵니다.' },
          { headline: 'API 키 설정을 확인해주세요', detail: 'Vercel 환경변수를 확인해주세요.' },
          { headline: '잠시만 기다려주세요', detail: '뉴스 데이터를 가져오는 중입니다.' },
          { headline: '60초마다 자동 업데이트됩니다', detail: '네이버 뉴스 API가 실시간으로 최신 뉴스를 가져옵니다.' }
        ];
        renderCards(newsData, false);
      }
    } finally {
      loader.classList.add('hidden');
      seqStep = 0;
      setTimeout(runSeq, 100);
    }
  }

  setInterval(function() {
    timeLeft--;
    document.getElementById('progFill').style.width = ((60 - timeLeft) / 60 * 100) + '%';
    document.getElementById('countdown').textContent = timeLeft + '초 후';
    if (timeLeft <= 0) { timeLeft = 60; fetchNews(); }
  }, 1000);

  fetchNews();
</script>

</body>
</html>
